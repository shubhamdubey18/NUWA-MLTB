name: Deploy NUWA-MLTB to Heroku

on:
  workflow_dispatch:
    inputs:

      # ── Heroku ──────────────────────────────────────────────────────────────
      HEROKU_APP_NAME:
        description: "Heroku App name (created automatically if it doesn't exist)"
        required: true
      HEROKU_API_KEY:
        description: "Heroku API key (Dashboard → Account → API Key)"
        required: true
      HEROKU_EMAIL:
        description: "Heroku account email"
        required: true
      HEROKU_TEAM_NAME:
        description: "Heroku Team name (leave blank if not using a team)"
        required: false

      # ── Required Bot Config ──────────────────────────────────────────────────
      BOT_TOKEN:
        description: "Telegram Bot Token (@BotFather)"
        required: true
      OWNER_ID:
        description: "Your Telegram user ID"
        required: true
      TELEGRAM_API:
        description: "Telegram API ID (my.telegram.org)"
        required: true
      TELEGRAM_HASH:
        description: "Telegram API Hash (my.telegram.org)"
        required: true
      DATABASE_URL:
        description: "MongoDB URI (mongodb+srv://...)"
        required: true
      BASE_URL:
        description: "App URL e.g. https://your-app-name.herokuapp.com"
        required: false
      BASE_URL_PORT:
        description: "Port for web server (default: 80)"
        required: false
        default: "80"

      # ── Upstream ─────────────────────────────────────────────────────────────
      UPSTREAM_REPO:
        description: "Upstream repo URL"
        required: false
        default: "https://github.com/shubhamdubey18/NUWA-MLTB"
      UPSTREAM_BRANCH:
        description: "Upstream branch"
        required: false
        default: "master"

      # ── Optional Bot Config ──────────────────────────────────────────────────
      AUTHORIZED_CHATS:
        description: "Authorized chat IDs (space-separated)"
        required: false
      SUDO_USERS:
        description: "Sudo user IDs (space-separated)"
        required: false
      USER_SESSION_STRING:
        description: "Pyrogram user session string"
        required: false
      CMD_SUFFIX:
        description: "Command suffix"
        required: false
      DEFAULT_UPLOAD:
        description: "Default upload destination: rc (Rclone) or gd (Google Drive)"
        required: false
        default: "rc"

      # ── Google Drive ─────────────────────────────────────────────────────────
      GDRIVE_ID:
        description: "Google Drive folder/TD ID"
        required: false
      INDEX_URL:
        description: "Google Drive index URL"
        required: false

      # ── Rclone ───────────────────────────────────────────────────────────────
      RCLONE_PATH:
        description: "Rclone remote path"
        required: false

      # ── Leech ────────────────────────────────────────────────────────────────
      LEECH_SPLIT_SIZE:
        description: "Leech split size in bytes (0 = auto)"
        required: false
        default: "0"
      LEECH_DUMP_CHAT:
        description: "Leech dump chat ID"
        required: false

      # ── Misc ─────────────────────────────────────────────────────────────────
      FILELION_API:
        description: "FileLion API key"
        required: false
      STREAMWISH_API:
        description: "StreamWish API key"
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HEROKU_API_KEY: ${{ inputs.HEROKU_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Remove deployment-only files
        run: |
          for file in README.md nuwa_hk_deploy.ipynb; do
            [ -f "$file" ] && echo "Removing $file" && rm -f "$file" || true
          done

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Authenticate Heroku
        run: |
          cat > ~/.netrc << EOF
          machine api.heroku.com
            login ${{ inputs.HEROKU_EMAIL }}
            password ${{ inputs.HEROKU_API_KEY }}
          machine git.heroku.com
            login ${{ inputs.HEROKU_EMAIL }}
            password ${{ inputs.HEROKU_API_KEY }}
          EOF
          chmod 600 ~/.netrc
          heroku auth:whoami

      - name: Create App & Set Container Stack
        run: |
          APP="${{ inputs.HEROKU_APP_NAME }}"
          TEAM="${{ inputs.HEROKU_TEAM_NAME }}"
          if [ -n "$TEAM" ]; then
            heroku apps:create "$APP" --team "$TEAM" --region us || echo "App already exists"
          else
            heroku apps:create "$APP" --region us || echo "App already exists"
          fi
          heroku stack:set container --app "$APP"

      - name: Set Config Vars
        run: |
          APP="${{ inputs.HEROKU_APP_NAME }}"
          heroku config:set \
            BOT_TOKEN="${{ inputs.BOT_TOKEN }}" \
            OWNER_ID="${{ inputs.OWNER_ID }}" \
            TELEGRAM_API="${{ inputs.TELEGRAM_API }}" \
            TELEGRAM_HASH="${{ inputs.TELEGRAM_HASH }}" \
            DATABASE_URL="${{ inputs.DATABASE_URL }}" \
            BASE_URL="${{ inputs.BASE_URL }}" \
            BASE_URL_PORT="${{ inputs.BASE_URL_PORT }}" \
            UPSTREAM_REPO="${{ inputs.UPSTREAM_REPO }}" \
            UPSTREAM_BRANCH="${{ inputs.UPSTREAM_BRANCH }}" \
            DEFAULT_UPLOAD="${{ inputs.DEFAULT_UPLOAD }}" \
            LEECH_SPLIT_SIZE="${{ inputs.LEECH_SPLIT_SIZE }}" \
            --app "$APP"
          # set optional vars only if provided
          [ -n "${{ inputs.AUTHORIZED_CHATS }}" ]    && heroku config:set AUTHORIZED_CHATS="${{ inputs.AUTHORIZED_CHATS }}" --app "$APP" || true
          [ -n "${{ inputs.SUDO_USERS }}" ]          && heroku config:set SUDO_USERS="${{ inputs.SUDO_USERS }}" --app "$APP" || true
          [ -n "${{ inputs.USER_SESSION_STRING }}" ] && heroku config:set USER_SESSION_STRING="${{ inputs.USER_SESSION_STRING }}" --app "$APP" || true
          [ -n "${{ inputs.CMD_SUFFIX }}" ]          && heroku config:set CMD_SUFFIX="${{ inputs.CMD_SUFFIX }}" --app "$APP" || true
          [ -n "${{ inputs.GDRIVE_ID }}" ]           && heroku config:set GDRIVE_ID="${{ inputs.GDRIVE_ID }}" --app "$APP" || true
          [ -n "${{ inputs.INDEX_URL }}" ]           && heroku config:set INDEX_URL="${{ inputs.INDEX_URL }}" --app "$APP" || true
          [ -n "${{ inputs.RCLONE_PATH }}" ]         && heroku config:set RCLONE_PATH="${{ inputs.RCLONE_PATH }}" --app "$APP" || true
          [ -n "${{ inputs.LEECH_DUMP_CHAT }}" ]     && heroku config:set LEECH_DUMP_CHAT="${{ inputs.LEECH_DUMP_CHAT }}" --app "$APP" || true
          [ -n "${{ inputs.FILELION_API }}" ]        && heroku config:set FILELION_API="${{ inputs.FILELION_API }}" --app "$APP" || true
          [ -n "${{ inputs.STREAMWISH_API }}" ]      && heroku config:set STREAMWISH_API="${{ inputs.STREAMWISH_API }}" --app "$APP" || true

      - name: Login to Heroku Container Registry
        run: heroku container:login

      - name: Build & Push Docker Image
        run: heroku container:push web --app "${{ inputs.HEROKU_APP_NAME }}"

      - name: Release Container
        run: heroku container:release web --app "${{ inputs.HEROKU_APP_NAME }}"

      - name: Deployment Summary
        run: |
          APP="${{ inputs.HEROKU_APP_NAME }}"
          echo "✅ Deployment complete!"
          echo "🔗 App URL : https://${APP}.herokuapp.com"
          echo "📊 Dashboard: https://dashboard.heroku.com/apps/${APP}"
