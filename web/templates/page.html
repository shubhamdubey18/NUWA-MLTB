<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clyfly Bot - Torrent Selector</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            transition: background-color 0.5s, color 0.5s;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0f1729 100%);
            color: #f5f5f7;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .dark {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0f1729 100%);
            color: #f5f5f7;
        }

        .light {
            background-color: #f5f5f7;
            color: #1d1d1f;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.15);
        }

        .dark .card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .light .card {
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.08);
            color: #1d1d1f;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            border: none;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.15);
            color: #f5f5f7;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 56px;
            height: 32px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.15);
            transition: 0.4s;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 24px;
            width: 24px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        input:checked+.slider {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border-color: rgba(99, 102, 241, 0.5);
        }

        input:checked+.slider:before {
            transform: translateX(24px);
        }

        .file-tree-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease;
            border-radius: 0.75rem;
            margin-bottom: 4px;
        }

        .file-tree-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .dark .file-tree-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .icon {
            margin-right: 12px;
            font-size: 1.3em;
            flex-shrink: 0;
        }

        .folder {
            cursor: pointer;
            font-weight: 600;
            color: #6366f1;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: rgba(15, 23, 41, 0.95);
            backdrop-filter: blur(20px);
            color: #f5f5f7;
            margin: 50% auto;
            transform: translateY(-50%);
            padding: 2rem;
            border-radius: 2rem;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        .dark .modal-content {
            background: rgba(15, 23, 41, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .light .modal-content {
            background: rgba(245, 245, 247, 0.95);
            color: #1d1d1f;
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(-50%);
            }
        }

        @keyframes day-night {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .day-night-animation {
            animation: day-night 1s linear;
        }

        .edit-name-input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.75rem;
            color: #f5f5f7;
            font-size: inherit;
            padding: 0.75rem 1rem;
            margin-right: 8px;
            width: 100%;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .edit-name-input:focus {
            outline: none;
            border: 1px solid rgba(99, 102, 241, 0.5);
            background: rgba(99, 102, 241, 0.1);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .pin-entry {
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .pin-entry.fadeOut {
            animation: fadeOut 0.5s;
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .size-info {
            font-size: 0.85em;
            color: #a0aec0;
            font-weight: 500;
        }

        .dark .size-info {
            color: #a0aec0;
        }

        .light input[type="text"],
        .light input[type="password"] {
            background: rgba(0, 0, 0, 0.05);
            color: #1d1d1f;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        header {
            background: rgba(15, 23, 41, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem 0;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 10;
        }

        footer {
            background: rgba(15, 23, 41, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem 0;
            box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.1);
            margin-top: auto;
            position: relative;
            z-index: 10;
        }

        .social-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .social-button:hover {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border-color: rgba(99, 102, 241, 0.5);
            transform: scale(1.1) translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
        }

        .brand-logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .edit-buttons {
            display: flex;
            gap: 8px;
        }

        .edit-buttons button {
            padding: 6px 12px;
            font-size: 0.8em;
        }

        @media (max-width: 640px) {
            .card {
                border-radius: 1.5rem;
            }

            .btn {
                padding: 0.65rem 1.25rem;
                font-size: 0.9rem;
            }

            .modal-content {
                width: 95%;
                padding: 1.5rem;
            }

            .footer-content {
                flex-direction: column-reverse;
                align-items: center;
            }

            .footer-buttons {
                margin-bottom: 1rem;
            }

            .file-tree-item .file-name,
            .file-tree-item .folder-name {
                font-size: 0.95em;
            }

            header {
                padding: 1rem 0;
            }

            .brand-logo {
                font-size: 1.4rem;
            }
        }

        #pinEntry {
            max-width: 380px;
            margin: 0 auto;
        }

        #pinEntry input[type="text"] {
            width: 100%;
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
            color: #f5f5f7;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        #pinEntry input[type="text"]:focus {
            outline: none;
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        #pinEntry button {
            width: 100%;
        }

        .file-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            min-width: 0;
        }

        .file-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .edit-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.9em;
            color: #6366f1;
            padding: 0;
            margin-left: 12px;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .edit-btn:hover {
            color: #8b5cf6;
            transform: scale(1.05);
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #6366f1;
        }

        .file-name {
            word-break: break-word;
            max-width: 100%;
            overflow-wrap: break-word;
            color: #f5f5f7;
            font-weight: 500;
        }

        main {
            position: relative;
            z-index: 1;
        }

        .stats-box {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.25rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
        }

        .stats-box p {
            margin: 0.5rem 0;
            font-size: 0.95rem;
            letter-spacing: 0.2px;
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .button-group-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .button-group-item .btn {
            width: 100%;
        }

        .button-group-item span {
            font-size: 0.75rem;
            color: #a0aec0;
            font-weight: 500;
        }
    </style>
</head>

<body class="dark">
    <header>
        <div class="container mx-auto px-4">
            <div class="flex flex-col sm:flex-row justify-between items-center">
                <div class="brand-logo">
                    <span>⚡</span>
                    <span>Clyfly Bot</span>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="flex items-center">
                        <span id="themeIcon" class="mr-3 text-2xl">🌙</span>
                        <label class="switch">
                            <input type="checkbox" id="themeToggle" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto p-4">
        <div id="pinEntry" class="card p-8 mb-6 pin-entry">
            <h2 class="text-2xl font-bold mb-2 text-center">Welcome to Clyfly Bot</h2>
            <p class="text-center text-sm text-gray-400 mb-6">Enter your PIN to access torrent files</p>
            <input type="text" id="pinInput"
                title="Enter the PIN code from Telegram to access torrent files"
                class="mb-6" placeholder="Enter PIN">
            <button id="submitPin" class="btn btn-primary w-full">Submit</button>
        </div>

        <div id="fileManager" class="card p-8 hidden">
            <h2 class="text-2xl font-bold mb-6">Select Files</h2>
            <div class="button-group">
                <div class="button-group-item">
                    <button id="selectAllBtn" class="btn btn-primary">Select All</button>
                    <span>in this folder</span>
                </div>
                <div class="button-group-item">
                    <button id="invertSelectionBtn" class="btn btn-primary">Invert</button>
                    <span>in this folder</span>
                </div>
                <div class="button-group-item">
                    <button id="selectEverythingBtn" class="btn btn-primary">Select All</button>
                    <span>all files</span>
                </div>
                <div class="button-group-item">
                    <button id="submitBtn" class="btn btn-primary">Submit</button>
                    <span>selection</span>
                </div>
            </div>

            <div class="stats-box">
                <p><span class="font-semibold">Selected files:</span> <span id="selectedCount">0</span> / <span id="totalCount">0</span></p>
                <p><span class="font-semibold">Total size:</span> <span id="selectedSize">0 B</span> / <span id="totalSize">0 B</span></p>
            </div>

            <div id="fileTree" class="mb-4"></div>
        </div>
    </main>

    <footer>
        <div class="container mx-auto px-4">
            <div class="footer-content flex flex-col sm:flex-row justify-between items-center">
                <p class="text-center sm:text-left mb-4 sm:mb-0 text-sm">&copy; 2024-2025 Clyfly Bot. All rights reserved.</p>
                <div class="footer-buttons flex space-x-3">
                    <a href="https://github.com/anasty17/mirror-leech-telegram-bot" target="_blank"
                        class="social-button" title="GitHub">
                        <i class="fab fa-github"></i>
                    </a>
                    <a href="https://www.instagram.com" target="_blank" class="social-button" title="Instagram">
                        <i class="fab fa-instagram"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <div id="reusableModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" class="text-2xl font-bold mb-4"></h2>
            <div id="modalBody" class="mb-6 text-sm"></div>
            <div id="modalFooter" class="flex gap-3 justify-end"></div>
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const body = document.body;
        const fileTree = document.getElementById('fileTree');
        const selectedCount = document.getElementById('selectedCount');
        const totalCount = document.getElementById('totalCount');
        const selectedSize = document.getElementById('selectedSize');
        const totalSize = document.getElementById('totalSize');
        const selectAllBtn = document.getElementById('selectAllBtn');
        const submitBtn = document.getElementById('submitBtn');
        const pinEntry = document.getElementById('pinEntry');
        const pinInput = document.getElementById('pinInput');
        const submitPin = document.getElementById('submitPin');
        const fileManager = document.getElementById('fileManager');
        const reusableModal = document.getElementById('reusableModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');
        const modalFooter = document.getElementById('modalFooter');
        pinInput.focus();
        const urlParams = new Proxy(new URLSearchParams(window.location.search), {
            get: (searchParams, prop) => searchParams.get(prop),
        });
        if (urlParams.pin) {
            pinInput.value = urlParams.pin
            setTimeout(() => submitPin.click(), 0);
        }
        let currentFolder = null;
        let files = [];
        let allowEdit = false;

        function loadThemePreference() {
            const savedTheme = localStorage.getItem('darkMode');
            if (savedTheme !== null) {
                const isDark = savedTheme === 'true';
                body.classList.toggle('dark', isDark);
                body.classList.toggle('light', !isDark);
                themeToggle.checked = isDark;
                themeIcon.textContent = isDark ? '☀️' : '🌙';
            }
        }

        function toggleTheme() {
            body.classList.toggle('dark');
            body.classList.toggle('light');
            const isDark = body.classList.contains('dark');
            themeIcon.textContent = isDark ? '☀️' : '🌙';
            themeIcon.classList.add('day-night-animation');
            setTimeout(() => themeIcon.classList.remove('day-night-animation'), 1000);
            localStorage.setItem('darkMode', isDark);
        }

        function formatSize(size) {
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            let i = 0;
            while (size >= 1024 && i < units.length - 1) {
                size /= 1024;
                i++;
            }
            return `${size.toFixed(2)} ${units[i]}`;
        }

        function calculateFolderSize(folder) {
            let totalSize = 0;
            const queue = [folder];
            while (queue.length > 0) {
                const node = queue.pop();
                if (node.type === 'file') {
                    totalSize += node.size;
                } else if (node.children) {
                    queue.push(...node.children);
                }
            }
            return totalSize;
        }

        function renderFileTree(nodes) {
            fileTree.innerHTML = '';
            if (currentFolder) {
                const backButton = document.createElement('div');
                backButton.className = 'file-tree-item folder';
                backButton.innerHTML = '<span class="icon">📁</span><span>Back</span>';
                backButton.addEventListener('click', goBack);
                fileTree.appendChild(backButton);
            }
            nodes.forEach(node => {
                const div = document.createElement('div');
                div.className = 'file-tree-item';
                const checkboxWrapper = document.createElement('div');
                checkboxWrapper.className = 'checkbox-wrapper';

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = node.id;
                checkbox.checked = node.selected;
                checkbox.addEventListener('change', () => toggleFile(node));

                checkboxWrapper.appendChild(checkbox);

                const icon = document.createElement('span');
                icon.className = 'icon';
                icon.textContent = node.type === 'folder' ? '📁' : '📄';

                const fileInfo = document.createElement('div');
                fileInfo.className = 'file-info';

                const nameElement = document.createElement('div');
                nameElement.className = 'file-name cursor-pointer';
                nameElement.textContent = node.name;

                const sizeInfo = document.createElement('div');
                sizeInfo.className = 'size-info';
                const size = node.type === 'folder' ? calculateFolderSize(node) : node.size;
                if (node.type === 'folder') {
                    sizeInfo.textContent = `${formatSize(size)}`;
                } else {
                    sizeInfo.textContent = `${formatSize(size)}`;
                    if (allowEdit) {
                        const editBtn = document.createElement('span');
                        editBtn.textContent = ' ✏️ Edit';
                        editBtn.className = 'edit-btn';
                        sizeInfo.appendChild(editBtn);
                    }
                    if (node.progress !== undefined) {
                        const progressText = document.createElement('span');
                        progressText.textContent = ` • ${node.progress}%`;
                        sizeInfo.appendChild(progressText);
                    }
                }
                div.addEventListener('click', (event) => {
                    if (event.target.className === 'file-name cursor-pointer') {
                        toggleFile(node)
                    } else if (event.target.className === 'edit-btn') {
                        openEditFileNameModal(node)
                    }
                })

                fileInfo.appendChild(nameElement);
                fileInfo.appendChild(sizeInfo);

                div.appendChild(checkboxWrapper);
                div.appendChild(icon);
                div.appendChild(fileInfo);

                if (node.type === 'folder') {
                    nameElement.classList.add('folder', 'folder-name');
                    nameElement.addEventListener('click', (e) => {
                        e.preventDefault();
                        openFolder(node);
                    });
                    if (areAllChildrenSelected(node)) {
                        checkbox.checked = true;
                    } else if (areSomeChildrenSelected(node)) {
                        checkbox.indeterminate = true;
                    }
                    if (allowEdit) {
                        const editBtn = document.createElement('span');
                        editBtn.textContent = ' ✏️ Edit';
                        editBtn.className = 'edit-btn';
                        sizeInfo.appendChild(editBtn);
                    }
                }

                fileTree.appendChild(div);
            });
            updateSelectAllButtonText();
            updateSelectEverythingButtonText();
        }

        function areAllChildrenSelected(folder) {
            return folder.children.every(child => child.type === 'folder' ? areAllChildrenSelected(child) : child.selected);
        }

        function areSomeChildrenSelected(folder) {
            return folder.children.some(child => child.type === 'folder' ? areSomeChildrenSelected(child) : child.selected);
        }

        function toggleFile(node) {
            if (node.type === 'folder') {
                const isSelected = !areAllChildrenSelected(node);
                toggleFolder(node, isSelected);
            } else {
                node.selected = !node.selected;
            }
            updateParentFolders(node);
            updateStats();
            renderFileTree(currentFolder ? currentFolder.children : files);
        }

        function toggleFolder(folder, isSelected) {
            folder.selected = isSelected;
            const queue = [folder];
            while (queue.length > 0) {
                const node = queue.pop();
                if (node.type === 'file') {
                    node.selected = isSelected;
                } else if (node.children) {
                    node.selected = isSelected;
                    queue.push(...node.children);
                }
            }
        }

        function updateParentFolders(node) {
            let parent = findParent(files[0], node.id);
            while (parent) {
                parent.selected = areAllChildrenSelected(parent);
                parent = findParent(files[0], parent.id);
            }
        }

        function findParent(root, id) {
            if (root.children) {
                for (const child of root.children) {
                    if (child.id === id) {
                        return root;
                    }
                    const found = findParent(child, id);
                    if (found) return found;
                }
            }
            return null;
        }

        function updateStats() {
            const stats = calculateStats(files);
            selectedCount.textContent = stats.selectedCount;
            totalCount.textContent = stats.totalCount;
            selectedSize.textContent = formatSize(stats.selectedSize);
            totalSize.textContent = formatSize(stats.totalSize);
        }

        function calculateStats(nodes) {
            let selectedCount = 0;
            let totalCount = 0;
            let selectedSize = 0;
            let totalSize = 0;

            const queue = [...nodes];
            while (queue.length > 0) {
                const node = queue.pop();
                if (node.type === 'file') {
                    totalCount++;
                    totalSize += node.size;
                    if (node.selected) {
                        selectedCount++;
                        selectedSize += node.size;
                    }
                }
                if (node.children) {
                    queue.push(...node.children);
                }
            }

            return { selectedCount, totalCount, selectedSize, totalSize };
        }

        function openFolder(folder) {
            currentFolder = folder;
            renderFileTree(folder.children);
            updateStats();
        }

        function goBack() {
            if (currentFolder) {
                const parent = findParent(files[0], currentFolder.id);
                if (parent) {
                    currentFolder = parent;
                    renderFileTree(parent.children);
                } else {
                    currentFolder = null;
                    renderFileTree(files);
                }
                updateStats();
            }
        }

        function selectAll() {
            const nodes = currentFolder ? currentFolder.children : files;
            const allSelected = nodes.every(node => node.type === 'folder' ? areAllChildrenSelected(node) : node.selected);
            nodes.forEach(node => {
                if (node.type === 'folder') {
                    toggleFolder(node, !allSelected);
                } else {
                    node.selected = !allSelected;
                }
            });
            updateStats();
            renderFileTree(nodes);
            updateSelectAllButtonText();
        }

        function invertSelection() {
            const nodes = currentFolder ? currentFolder.children : files;
            nodes.forEach(node => {
                if (node.type === 'folder') {
                    invertFolderSelection(node);
                } else {
                    node.selected = !node.selected;
                }
            });
            updateStats();
            renderFileTree(nodes);
        }

        function invertFolderSelection(folder) {
            folder.selected = !folder.selected;
            if (folder.children) {
                folder.children.forEach(child => {
                    if (child.type === 'folder') {
                        invertFolderSelection(child);
                    } else {
                        child.selected = !child.selected;
                    }
                });
            }
        }

        function selectEverything() {
            const allSelected = files.every(node => node.type === 'folder' ? areAllChildrenSelected(node) : node.selected);
            function recursiveSelect(nodes, select) {
                nodes.forEach(node => {
                    if (node.type === 'folder') {
                        node.selected = select;
                        if (node.children) {
                            recursiveSelect(node.children, select);
                        }
                    } else {
                        node.selected = select;
                    }
                });
            }
            recursiveSelect(files, !allSelected);
            updateStats();
            renderFileTree(currentFolder ? currentFolder.children : files);
            updateSelectEverythingButtonText();
        }

        function getFullPath(node) {
            const path = [];
            let currentNode = findParent(files[0], node.id);
            while (currentNode) {
                path.unshift(currentNode.name);
                currentNode = findParent(files[0], currentNode.id);
            }
            return path.length > 0 ? path.join('/') : '';
        }

        function openEditFileNameModal(node) {
            modalTitle.textContent = `Edit ${node.type === 'folder' ? 'Folder' : 'File'} Name`;
            modalBody.innerHTML = `
                <input type="text" id="editNameInput" class="edit-name-input" value="${node.name}">
            `;
            modalFooter.innerHTML = `
                <button class="btn btn-secondary" onClick="closeModal()">Cancel</button>
                <button id="saveNameBtn" class="btn btn-primary">Save</button>
            `;

            const saveNameBtn = document.getElementById('saveNameBtn');
            const editNameInput = document.getElementById('editNameInput');

            saveNameBtn.addEventListener('click', () => {
                closeModal();
                const newName = editNameInput.value.trim();
                if (newName && newName !== node.name) {
                    const fullPath = getFullPath(node);
                    const requestUrl = `/app/files/torrent?gid=${urlParams.gid}&pin=${pinInput.value}&mode=rename`;
                    const body = {
                        old_path: fullPath ? `${fullPath}/${node.name}` : node.name,
                        new_path: fullPath ? `${fullPath}/${newName}` : newName,
                        type: node.type,
                    };
                    fetch(requestUrl, {
                        'method': 'POST',
                        'body': JSON.stringify(body),
                    }).then(response => {
                        if (response.ok) {
                            modalTitle.textContent = '✅ Success!';
                            modalBody.innerHTML = '<p>Your rename has been submitted successfully.</p>';
                            node.name = newName;
                            renderFileTree(currentFolder ? currentFolder.children : files);
                        } else {
                            modalTitle.textContent = '❌ Error';
                            modalBody.innerHTML = '<p>There was an error submitting your rename. Please try again.</p>';
                        }
                        modalFooter.innerHTML = '<button class="btn btn-primary" onclick="closeModal()">Okay</button>';
                        openModal();
                    });
                }
            });

            editNameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    saveNameBtn.click();
                }
            });

            openModal();
            editNameInput.setSelectionRange(editNameInput.value.length, editNameInput.value.length)
            editNameInput.focus();
        }

        function openModal() {
            reusableModal.style.display = 'flex';
            reusableModal.style.alignItems = 'center';
            reusableModal.style.justifyContent = 'center';
        }

        function closeModal() {
            reusableModal.style.display = 'none';
        }

        function submitData() {
            if (parseInt(selectedCount.innerText) === 0) {
                modalTitle.textContent = '⚠️ No Files Selected';
                modalBody.innerHTML = '<p>Please select at least one file to proceed.</p>';
                modalFooter.innerHTML = '<button class="btn btn-primary" onclick="closeModal()">Okay</button>';
                openModal();
                return;
            }
            modalTitle.textContent = '⏳ Processing...';
            modalBody.innerHTML = `<p>Submitting <strong>${selectedCount.innerText}</strong> file(s)...</p>`;
            modalFooter.innerHTML = '';
            openModal();
            const requestUrl = `/app/files/torrent?gid=${urlParams.gid}&pin=${pinInput.value}&mode=selection`;
            fetch(requestUrl, { 'method': 'POST', 'body': JSON.stringify(files) }).then(response => {
                if (reusableModal.style.display !== 'none') {
                    closeModal();
                }
                if (response.ok) {
                    modalTitle.textContent = '✅ Success!';
                    modalBody.innerHTML = '<p>Your selection has been submitted successfully.</p>';
                } else {
                    modalTitle.textContent = '❌ Error';
                    modalBody.innerHTML = '<p>An error occurred while submitting your selection. Please try again.</p>';
                }
                modalFooter.innerHTML = '<button class="btn btn-primary" onclick="closeModal()">Okay</button>';
                openModal();
            });
        }

        pinInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitPin.click();
            }
        });

        submitPin.addEventListener('click', () => {
            pinInput.blur();
            if (pinInput.value === '') {
                modalTitle.textContent = '⚠️ Missing PIN';
                modalBody.innerHTML = `<p>Please enter your PIN to continue.</p>`;
                modalFooter.innerHTML = '<button class="btn btn-primary" onClick="closeModal()">Try Again</button>';
                openModal();
                return false;
            }
            if (urlParams.gid == null || urlParams.gid === '') {
                modalTitle.textContent = '⚠️ Missing Parameter';
                modalBody.innerHTML = `<p>The parameter <strong>gid</strong> is missing.</p>`;
                modalFooter.innerHTML = '<button class="btn btn-primary" onClick="closeModal()">Try Again</button>';
                openModal();
                return false;
            }
            const requestUrl = `/app/files/torrent?gid=${urlParams.gid}&pin=${pinInput.value}&mode=get`;
            fetch(requestUrl).then(function (response) {
                if (response.ok) {
                    return response.json().then(data => {
                        if (data.error) {
                            modalTitle.textContent = '❌ ' + data.error;
                            modalBody.innerHTML = `<p>${data.message}. Please try again.</p>`;
                            modalFooter.innerHTML = '<button class="btn btn-primary" onclick="closeModal()">Retry</button>';
                            openModal();
                        } else {
                            files = data.files;
                            allowEdit = data.engine === "qbittorrent";
                            pinEntry.classList.add('fadeOut');
                            setTimeout(() => {
                                pinEntry.style.display = 'none';
                                fileManager.classList.remove('hidden');
                                renderFileTree(files);
                                updateStats();
                                updateSelectAllButtonText();
                                updateSelectEverythingButtonText();
                            }, 500)
                        }
                    });
                } else {
                    modalTitle.textContent = '❌ Connection Error';
                    modalBody.innerHTML = '<p>Check console. Status Code: ' + response.status + '</p>';
                    modalFooter.innerHTML = '<button class="btn btn-primary" onclick="closeModal()">Retry</button>';
                    openModal();
                }
            }).catch(error => {
                modalTitle.textContent = '❌ Server Error';
                modalBody.innerHTML = '<p>There was an error connecting to the server.</p><p style="font-size: 0.85rem; margin-top: 0.5rem; opacity: 0.8;">' + error.message + '</p>';
                modalFooter.innerHTML = '<button class="btn btn-primary" onclick="closeModal()">Retry</button>';
                openModal();
            });
        });

        themeToggle.addEventListener('change', toggleTheme);
        const invertSelectionBtn = document.getElementById('invertSelectionBtn');
        const selectEverythingBtn = document.getElementById('selectEverythingBtn');

        invertSelectionBtn.addEventListener('click', invertSelection);
        selectEverythingBtn.addEventListener('click', selectEverything);

        selectAllBtn.addEventListener('click', selectAll);
        selectEverythingBtn.addEventListener('click', selectEverything);
        submitBtn.addEventListener('click', submitData);

        reusableModal.addEventListener('click', (event) => {
            if (event.target === reusableModal) {
                closeModal();
            }
        });

        function updateSelectAllButtonText() {
            const nodes = currentFolder ? currentFolder.children : files;
            const allSelected = nodes.every(node => node.type === 'folder' ? areAllChildrenSelected(node) : node.selected);
            selectAllBtn.textContent = allSelected ? 'Deselect All' : 'Select All';
        }

        function updateSelectEverythingButtonText() {
            const allSelected = selectedCount.innerText === totalCount.innerText && parseInt(totalCount.innerText) > 0;
            selectEverythingBtn.textContent = allSelected ? 'Deselect All' : 'Select All';
        }

        loadThemePreference();
    </script>
</body>

</html>
